    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0ede6; --surface: #e8e5de; --border: #c8c4ba; --border-dark: #2e2e2e;
      --text: #111111; --muted: #888880; --hint: #bbbbbb;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 62px; background: rgba(240,237,230,0.92); backdrop-filter: blur(12px); border-bottom: 0.6px solid var(--border); }
    .nav-left { display: flex; align-items: center; gap: 32px; }
    .nav-logo { font-family: var(--font-display); font-size: 14px; font-weight: 800; letter-spacing: 5px; color: var(--text); text-decoration: none; text-transform: uppercase; }
    .nav-logo span { color: var(--muted); }
    .nav-index { font-size: 8px; letter-spacing: 1.5px; color: var(--hint); padding-top: 2px; }
    nav ul { list-style: none; display: flex; align-items: center; gap: 36px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; transition: color 0.2s; position: relative; font-weight: 400; }
    nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 0.8px; background: var(--text); transition: width 0.3s; }
    nav a:hover { color: var(--text); }
    nav a:hover::after, nav a.active::after { width: 100%; }
    nav a.active { color: var(--text); font-weight: 500; }
    .hero { margin-top: 62px; height: 38vh; min-height: 340px; background: #111; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 40px 36px; }
    .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(#1e1e1e 0.4px, transparent 0.4px), linear-gradient(90deg, #1e1e1e 0.4px, transparent 0.4px); background-size: 38px 38px; pointer-events: none; opacity: 0.6; }
    .hero-line-left { position: absolute; left: 40px; top: 0; bottom: 0; width: 0.8px; background: #2a2a2a; }
    .hero-year { position: absolute; top: 24px; left: 56px; font-size: 7.5px; letter-spacing: 3px; color: #444; text-transform: uppercase; }
    .hero-content { position: relative; z-index: 1; }
    .hero h1 { font-family: var(--font-display); font-size: clamp(72px, 11vw, 118px); font-weight: 800; line-height: 0.88; color: #fff; letter-spacing: -3px; text-transform: uppercase; opacity: 0; animation: fadeUp 0.9s ease 0.2s both; }
    .hero-divider { width: 0; height: 0.6px; background: #2e2e2e; margin: 14px 0 12px; animation: expandLine 0.8s ease 0.7s both; }
    .hero-sub { display: flex; align-items: center; gap: 14px; opacity: 0; animation: fadeUp 0.7s ease 0.9s both; }
    .hero-sub span { font-size: 8px; letter-spacing: 4px; color: #555; text-transform: uppercase; font-weight: 300; }
    .hero-sub-sep { width: 16px; height: 0.6px; background: #333; }
    .hero-scroll { position: absolute; bottom: 0; left: 40px; display: flex; flex-direction: column; align-items: center; gap: 0; opacity: 0; animation: fadeUp 0.7s ease 1.1s both; }
    .hero-scroll-line { width: 0.8px; height: 48px; background: linear-gradient(to bottom, #333, transparent); }
    .filter-bar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 0.6px solid var(--border); background: var(--bg); }
    .filter-left { display: flex; align-items: center; gap: 0; }
    .filter-sort-label { font-size: 7.5px; letter-spacing: 2.5px; color: var(--hint); text-transform: uppercase; margin-right: 20px; padding-right: 20px; border-right: 0.6px solid var(--border); }
    .filter-buttons { display: flex; align-items: center; gap: 4px; }
    .filter-btn { background: transparent; border: 0.6px solid transparent; color: var(--muted); padding: 5px 14px; font-family: var(--font-body); font-size: 7.5px; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-weight: 400; }
    .filter-btn:hover { color: var(--text); border-color: var(--border); }
    .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .filter-count { font-size: 7.5px; letter-spacing: 2.5px; color: var(--hint); text-transform: uppercase; }
    .filter-count span { color: var(--text); font-weight: 500; }
    .gallery-wrap { padding: 2px 40px 80px; background: var(--bg); }
    .masonry { columns: 3; column-gap: 2px; }
    .photo-card { break-inside: avoid; position: relative; overflow: hidden; cursor: pointer; margin-bottom: 2px; background: var(--surface); display: block; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; content-visibility: auto; contain-intrinsic-size: 1px 400px; }
    .photo-card.visible { opacity: 1; transform: translateY(0); }
    .photo-card img { width: 100%; height: auto; display: block; transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s; filter: brightness(0.9) saturate(0.95); }
    .photo-card:hover img { transform: scale(1.03); filter: brightness(1) saturate(1); }
    .photo-num { position: absolute; top: 12px; left: 14px; font-size: 7px; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); font-weight: 400; z-index: 2; transition: opacity 0.3s; }
    .photo-card:hover .photo-num { opacity: 0; }
    .photo-fav { font-size: 13px; color: rgba(255,255,255,0.35); cursor: pointer; background: none; border: none; padding: 0 0 0 7px; line-height: 1; transition: color 0.2s, transform 0.2s; }
    .photo-fav:hover { transform: scale(1.2); color: rgba(255,255,255,0.9); }
    .photo-fav.active { color: #e0b800; }
    .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.2) 45%, transparent 70%); opacity: 0; pointer-events: none; transition: opacity 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; }
    .photo-card:hover .photo-overlay { opacity: 1; pointer-events: all; }
    .photo-overlay-top { position: absolute; top: 0; left: 0; right: 0; padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; }
    .photo-location-tag { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.55); background: rgba(0,0,0,0.5); padding: 3px 8px; backdrop-filter: blur(4px); }
    .photo-year-tag { font-size: 7px; letter-spacing: 2px; color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.5); padding: 3px 8px; backdrop-filter: blur(4px); }
    .photo-overlay-bottom { position: relative; }
    .photo-overlay-line { width: 24px; height: 0.6px; background: rgba(255,255,255,0.25); margin-bottom: 8px; }
    .photo-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 5px; letter-spacing: 0.3px; display: flex; align-items: baseline; }
    .photo-meta-row { display: flex; align-items: center; justify-content: space-between; }
    .photo-gear { font-size: 7px; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; }
    .photo-expand-icon { width: 22px; height: 22px; border: 0.6px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
    .photo-expand-icon:hover { border-color: rgba(255,255,255,0.6); }
    .photo-expand-icon svg { width: 10px; height: 10px; stroke: rgba(255,255,255,0.6); fill: none; }
    .lightbox { position: fixed; inset: 0; z-index: 200; background: rgba(15,15,15,0.98); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-inner { position: relative; max-width: 1200px; width: 92%; display: flex; flex-direction: column; align-items: center; gap: 20px; transform: translateY(10px); transition: transform 0.35s; }
    .lightbox.open .lightbox-inner { transform: translateY(0); }
    .lightbox-img-wrap { width: 100%; display: flex; align-items: center; justify-content: center; }
    .lightbox-img-wrap img { max-width: 100%; max-height: 78vh; width: auto; height: auto; display: block; }
    .lightbox-info { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .lightbox-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    .lightbox-meta { display: flex; align-items: center; gap: 14px; }
    .lightbox-location { font-size: 7.5px; letter-spacing: 2.5px; text-transform: uppercase; color: #666; }
    .lightbox-sep { width: 14px; height: 0.6px; background: #333; }
    .lightbox-year { font-size: 7.5px; letter-spacing: 2.5px; color: #555; }
    .lightbox-gear { font-size: 7.5px; color: #555; letter-spacing: 1.5px; text-transform: uppercase; }
    .lightbox-close { position: fixed; top: 24px; right: 32px; background: none; border: 0.6px solid #333; color: #666; cursor: pointer; font-size: 7.5px; letter-spacing: 2.5px; text-transform: uppercase; padding: 6px 14px; transition: all 0.2s; font-family: var(--font-body); }
    .lightbox-close:hover { color: #fff; border-color: #666; }
    .lightbox-counter { position: fixed; top: 26px; left: 32px; font-size: 7.5px; letter-spacing: 2px; color: #444; }
    .lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); background: transparent; border: 0.6px solid #2a2a2a; color: #555; cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .lightbox-nav:hover { border-color: #555; color: #fff; }
    .lightbox-nav.prev { left: 24px; }
    .lightbox-nav.next { right: 24px; }
    .lightbox-nav svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
    footer { border-top: 0.6px solid var(--border); padding: 0 40px; height: 52px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); }
    footer p { font-size: 7.5px; color: var(--hint); letter-spacing: 2px; text-transform: uppercase; }

    img { -webkit-user-drag: none; user-select: none; pointer-events: none; }

      .hero { padding: 0 20px 24px; height: auto; min-height: 260px; }

      .hero-line-left { left: 20px; }
      .hero-year { left: 36px; }
      .filter-bar { padding: 10px 16px; height: auto; flex-direction: column; align-items: flex-start; gap: 8px; }
      .filter-left { width: 100%; flex-wrap: wrap; }
      .filter-sort-label { display: none; }
      .filter-buttons { flex-wrap: wrap; gap: 2px; }
      .filter-btn { padding: 4px 10px; font-size: 7px; }
      .filter-count { font-size: 7px; align-self: flex-end; }
      .gallery-wrap { padding: 2px 0 60px; }
      .masonry { columns: 1; column-gap: 0; }
      .lightbox-nav.prev { left: 8px; }
      .lightbox-nav.next { right: 8px; }
      .lightbox-close { right: 12px; top: 16px; font-size: 7px; padding: 5px 10px; }
      .lightbox-counter { left: 12px; top: 18px; }
      footer { padding: 14px 16px; flex-direction: column; height: auto; gap: 4px; text-align: center; }
      .lightbox { align-items: center; padding: 80px 0 40px; overflow-y: auto; }
      .lightbox-inner { justify-content: center; margin: auto; }

    // ── GÉNÉRATION DES CARTES ──
    (function() {
      var g = document.getElementById('gallery');
      var svg = '<svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>';
      photos.forEach(function(p) {
        var c = document.createElement('div');
        c.className = 'photo-card';
        c.dataset.category = p.category;
        c.dataset.title = p.title;
        c.dataset.gear = p.gear;
        c.dataset.location = p.location;
        c.dataset.year = p.year;
        c.dataset.srcFull = p.srcFull;
        var n = document.createElement('span');
        n.className = 'photo-num';
        n.textContent = p.num;
        var img = document.createElement('img');
        img.src = p.src;
        img.alt = p.title;
        img.loading = 'lazy';
        img.decoding = 'async';
        var ov = document.createElement('div');
        ov.className = 'photo-overlay';
        ov.innerHTML =
          '<div class="photo-overlay-top">' +
            '<span class="photo-location-tag">' + p.locTag + '</span>' +
            '<span class="photo-year-tag">' + p.year + '</span>' +
          '</div>' +
          '<div class="photo-overlay-bottom">' +
            '<div class="photo-overlay-line"></div>' +
            '<div class="photo-title">' + p.title + ' <button class="photo-fav" onclick="toggleFav(this, event)">&#9733;</button></div>' +
            '<div class="photo-meta-row">' +
              '<span class="photo-gear">' + p.gear + '</span>' +
              '<div class="photo-expand-icon">' + svg + '</div>' +
            '</div>' +
          '</div>';
        c.appendChild(n);
        c.appendChild(img);
        c.appendChild(ov);
        g.appendChild(c);
      });
    })();

    const allCards = [...document.querySelectorAll('.photo-card')];
    const gallery = document.getElementById('gallery');

    // ── SHUFFLE ──
    allCards.sort(() => Math.random() - 0.5);
    allCards.forEach(card => gallery.appendChild(card));

    // L'optimisation pour les 84 photos :
    allCards.forEach((card, index) => {
      const img = card.querySelector('img');
      if (img && index > 5) { // Les 6 premières chargent normalement, les autres attendent le scroll
        img.setAttribute('loading', 'lazy');
        img.setAttribute('decoding', 'async');
      }
    });

    // ── FAVORIS ──
    function getFavs() { return JSON.parse(localStorage.getItem('focale_favs') || '[]'); }
    function saveFavs(favs) { localStorage.setItem('focale_favs', JSON.stringify(favs)); }
    function toggleFav(btn, e) {
      e.stopPropagation();
      const card = btn.closest('.photo-card');
      const title = card.dataset.title;
      let favs = getFavs();
      if (favs.includes(title)) {
        favs = favs.filter(f => f !== title);
        btn.classList.remove('active');
      } else {
        favs.push(title);
        btn.classList.add('active');
      }
      saveFavs(favs);
    }
    function initFavs() {
      const favs = getFavs();
      allCards.forEach(card => {
        const btn = card.querySelector('.photo-fav');
        if (btn && favs.includes(card.dataset.title)) btn.classList.add('active');
      });
    }
    initFavs();

    // ── COMPTEUR ──
    function animateCount(target) {
      let count = 0;
      const step = Math.ceil(target / 40);
      const el = document.getElementById('photoCount');
      const interval = setInterval(() => {
        count = Math.min(count + step, target);
        el.textContent = count;
        if (count >= target) clearInterval(interval);
      }, 28);
    }
    animateCount(allCards.length);

    // ── SCROLL REVEAL ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), 60);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.06 });
    allCards.forEach(card => observer.observe(card));

    // ── FILTER ──
    let currentFilter = 'all';
    function applyFilter(filter) {
      currentFilter = filter;
      allCards.forEach(card => {
        const show = filter === 'all' || card.dataset.category === filter;
        if (show) {
          card.style.display = '';
          setTimeout(() => card.classList.add('visible'), 10);
        } else {
          card.classList.remove('visible');
          setTimeout(() => { card.style.display = 'none'; }, 400);
        }
      });
      setTimeout(() => {
        animateCount(allCards.filter(c => c.style.display !== 'none').length);
      }, 420);
    }

    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.filter);
      });
    });

    // ── SWIPE MOBILE ──
    let touchStartX = 0;
    const lb = document.getElementById('lightbox');
    lb.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    lb.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].screenX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) currentIndex = (currentIndex + 1) % visibleCards.length;
        else currentIndex = (currentIndex - 1 + visibleCards.length) % visibleCards.length;
        showSlide(currentIndex);
      }
    }, { passive: true });

    // ── LIGHTBOX ──
    const lightbox = document.getElementById('lightbox');
    const lbImgWrap = document.getElementById('lbImgWrap');
    const lbTitle = document.getElementById('lbTitle');
    const lbLocation = document.getElementById('lbLocation');
    const lbYear = document.getElementById('lbYear');
    const lbGear = document.getElementById('lbGear');
    const lbCounter = document.getElementById('lbCounter');
    let visibleCards = [];
    let currentIndex = 0;

    function getVisible() { return allCards.filter(c => c.style.display !== 'none'); }

    function openLightbox(card) {
      visibleCards = getVisible();
      currentIndex = visibleCards.indexOf(card);
      showSlide(currentIndex);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function showSlide(index) {
      const card = visibleCards[index];
      const img = card.querySelector('img');
      lbImgWrap.innerHTML = '';
      if (img) {
        const clone = document.createElement('img');
        clone.src = card.dataset.srcFull || img.src;
        clone.alt = card.dataset.title;
        lbImgWrap.appendChild(clone);
      }
      lbTitle.textContent = card.dataset.title;
      lbLocation.textContent = card.dataset.location || '';
      lbYear.textContent = card.dataset.year || '';
      lbGear.textContent = card.dataset.gear || '';
      lbCounter.textContent = (index + 1).toString().padStart(2,'0') + ' / ' + visibleCards.length.toString().padStart(2,'00');
      document.title = card.dataset.title + ' — Focale';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      document.title = 'Focale — Portfolio';
    }

    allCards.forEach(card => card.addEventListener('click', () => openLightbox(card)));
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); currentIndex = (currentIndex - 1 + visibleCards.length) % visibleCards.length; showSlide(currentIndex); });
    document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); currentIndex = (currentIndex + 1) % visibleCards.length; showSlide(currentIndex); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + visibleCards.length) % visibleCards.length; showSlide(currentIndex); }
      if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % visibleCards.length; showSlide(currentIndex); }
    });
  </script>
  <script>
    document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
  </script>
